baseURL = "https://irfanykywz.github.io/"
languageCode = "en-us"
title = "irfanykywz"
theme = "hugo-ykywz"
copyright = "irfanykywz"
pagination.pagerSize = 5

pygmentsstyle = "vs"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true


[params]
	# browser icon
	favicon = "https://avatars.githubusercontent.com/u/117440754?v=4"

	# Optional 64x64 avatar image.
	avatar = "https://avatars.githubusercontent.com/u/117440754?v=4"

# Menu Header
[[menu.main]]
name = "Home"
url = "/"
pre = "fas fa-home"
weight = 1

[[menu.main]]
name = "Portofolio"
url = "/portofolio/"
pre = "fas fa-briefcase"
weight = 2

[[menu.main]]
name = "Learn"
url = "/learn/"
pre = "fas fa-graduation-cap"
weight = 3

[[menu.main]]
name = "Posts"
url = "/posts/"
pre = "fas fa-blog"
weight = 4

[[menu.main]]
name = "Contact"
url = "/contact/"
pre = "fas fa-envelope"
weight = 5

# Menu Footer
[[menu.footer]]
name = "Journal"
url = "/journal/"
pre = "fas fa-book"
weight = 1

[[menu.footer]]
name = "Collection"
url = "/collection/"
pre = "fa-solid fa-lines-leaning"
weight = 2

[[menu.footer]]
name = "Research"
url = "/research/"
pre = "fa-solid fa-flask"
weight = 4

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = false
    style = "dracula"  # or any other chroma style
    tabWidth = 4

[taxonomies]
  category = 'categories'
  tag = 'tags'

# allow html to content .md
[markup.goldmark.renderer] 
	unsafe= true

# allow shortcodes
[security]
	enableInlineShortcodes = true	

# output format
[outputs]
  home = ["HTML", "RSS", "JSON"]  

[outputFormats]
[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true
  notAlternative = true  