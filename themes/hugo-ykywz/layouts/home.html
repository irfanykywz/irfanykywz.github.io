{{ define "main" }}


<main class="main">
    <section class="hero">
        <div class="container">
            <div class="profile-section">
                <div class="profile-image">
                    <img src="{{ .Site.Params.Avatar | safeURL }}" alt="{{ .Site.Title }}" />
                </div>
                <div class="profile-info">
                    <h1 class="profile-name">{{ .Title }}</h1>
                    <p class="profile-title">{{ .Description }}</p>
                    <div class="profile-actions">
                        <a href="{{ .Params.Cv }}" target="_blank" class="btn btn-primary">
                            <i class="fas fa-download"></i>
                            Download CV
                        </a>
                        <a href="mailto:{{ .Params.Email }}" class="btn btn-secondary">
                            <i class="fas fa-envelope"></i>
                            Email
                        </a>
                        <a href="{{ .Params.Linkedin }}" target="_blank" class="btn btn-secondary">
                            <i class="fab fa-linkedin"></i>
                            LinkedIn
                        </a>
                    </div>
                </div>
            </div>

            {{ .Content }}


        </div>
    </section>

    {{ partial "cta.html" . }}

</main>

{{ end }}
