<div class="project-tech-stack">
    <h2 class="section-title">
        <i class="fas fa-code"></i>
        Technology Stack
    </h2>
    <div class="tech-stack-grid">
        <div class="tech-category">
            <div class="tech-list">

                {{ $items := split (.Get "stack")  "," }}
                {{ range $index, $item := $items }}
                <div class="tech-item">
                    <i class="fas fa-code"></i>
                    <span>{{ $item }}</span>
                </div>
                {{ end }}

            </div>
        </div>
    </div>
</div>
