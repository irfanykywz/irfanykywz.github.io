<div class="testimonial-card">
    <div class="testimonial-content">
        <p>
            "{{ .Get "review" }}"
        </p>
    </div>
    <div class="testimonial-author">
        <div class="author-info">
            <h4>{{ .Get "author" }}</h4>
            <p>{{ .Get "from"}}</p>
        </div>
        <div class="testimonial-rating">
            {{ range (seq .Params.rating)}}
            <i class="fas fa-star"></i>
            {{ end }}
        </div>
    </div>
</div>
