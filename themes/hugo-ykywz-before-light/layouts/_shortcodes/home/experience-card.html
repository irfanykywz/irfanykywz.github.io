<div class="popular-tag-card">
    <div class="tag-info">
        <h3>{{ .Get "title" }}</h3>
        <small>
            {{ .Get "time" }}
        </small>
        <ul>
            {{ $items := split (.Get "jobs")  "," }}
            {{ range $index, $item := $items }}
            <li>
                {{ $item }}
            </li>
            {{ end }}
        </ul>
    </div>
</div>
